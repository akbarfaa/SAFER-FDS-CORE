services:
  - type: web
    name: safer-api
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python start_services.py
    envVars:
      - key: RENDER
        value: "true"
      - key: IS_PRODUCTION
        value: "true"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONIOENCODING
        value: "utf-8"
    healthCheckPath: /health
