server {
    server_name api.safer.web.id;

    location / {
        # Handle CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Content-Type, Authorization, X-Client-ID, X-Client-Secret' always;
            add_header Access-Control-Max-Age 86400;
            return 204;
        }

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Add CORS headers to all responses
        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Content-Type, Authorization, X-Client-ID, X-Client-Secret' always;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/api.safer.web.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.safer.web.id/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
server {
    if ($host = api.safer.web.id) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name api.safer.web.id;
    return 404;
}
